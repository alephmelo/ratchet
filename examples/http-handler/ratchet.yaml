name: http-handler
editable:
  - handler.py
readonly:
  - benchmark.py
run: "python3 benchmark.py"

# Multi-metric Pareto optimization: improve throughput AND reduce tail latency
metrics:
  - name: requests_per_sec
    grep: "^requests_per_sec:"
    direction: maximize
  - name: latency_p99
    grep: "^latency_p99:"
    direction: minimize

constraints:
  - name: correctness
    grep: "^correctness:"
    fail_below: 100.0

timeout: 60

baseline:
  requests_per_sec: 5200.0
  latency_p99: 0.290

context: |
  You are optimizing a mock HTTP request handler (handler.py).

  The handler processes batches of requests: GET /health, GET /users/{id},
  POST /users, GET /search?q=..., and returns responses.

  The SEARCH endpoint is the bottleneck — it brute-force scans 10,000 IDs
  checking if the query string appears in str(id). This is called for ~20%
  of requests.

  Key tradeoff: throughput vs tail latency.
  - Caching/precomputation can speed up repeated queries but adds per-request overhead.
  - Batching strategies can improve throughput but may spike p99 latency.
  - Algorithmic improvements to the search (e.g., building an index) help both,
    but consume more memory and add initialization cost.

  The benchmark measures per-batch latency (50 requests per batch) and computes
  p99 across all batches. Total throughput is requests / wall-clock time.

  All responses MUST match the expected output exactly — correctness is 100% or fail.

agent: "opencode run -m opencode/minimax-m2.5-free < {prompt}"
max_iterations: 20
patience: 5
